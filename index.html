<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N3單字">
<link rel="manifest" href="manifest.json">
<title>JLPT N3 單字王</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#4F46E5;--pri2:#3730A3;--grn:#059669;--red:#DC2626;--org:#D97706;
  --bg:#EEF2FF;--card:#fff;--txt:#1F2937;--sub:#6B7280;--bdr:#E5E7EB;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif}
body{background:var(--bg);color:var(--txt);user-select:none;-webkit-user-select:none}
#app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* HEADER */
.hdr{background:var(--pri);color:#fff;padding:14px 18px;padding-top:max(14px,env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  box-shadow:0 2px 10px rgba(79,70,229,.35)}
.hdr h1{font-size:19px;font-weight:700;letter-spacing:.5px}
.hdr-sub{font-size:12px;opacity:.8;margin-top:1px}
.hdr-right{display:flex;gap:10px}
.hdr-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;
  width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen{display:none;padding:16px;min-height:100%}
.screen.active{display:block}

/* BOTTOM NAV */
.bnav{display:flex;background:#fff;border-top:1px solid var(--bdr);flex-shrink:0;
  padding-bottom:max(6px,env(safe-area-inset-bottom))}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border:none;background:none;color:var(--sub);font-size:11px;cursor:pointer;transition:color .2s}
.bnav-btn.active{color:var(--pri)}
.bnav-btn svg{width:22px;height:22px}

/* CARDS */
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:14px;padding:14px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-num{font-size:28px;font-weight:800;color:var(--pri)}
.stat-lbl{font-size:12px;color:var(--sub);margin-top:2px}

/* BUTTONS */
.btn{display:block;width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;
  font-weight:600;cursor:pointer;transition:transform .15s,opacity .15s;margin-bottom:10px}
.btn:active{transform:scale(.97);opacity:.9}
.btn-pri{background:var(--pri);color:#fff}
.btn-sec{background:#fff;color:var(--pri);border:2px solid var(--pri)}
.btn-grn{background:var(--grn);color:#fff}
.btn-sml{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 16px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}

/* STREAK */
.streak-bar{background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:16px;
  padding:16px;margin-bottom:14px;color:#fff;display:flex;align-items:center;justify-content:space-between}
.streak-left h2{font-size:22px;font-weight:800}
.streak-left p{font-size:13px;opacity:.85;margin-top:2px}
.streak-fire{font-size:48px;line-height:1}

/* PROGRESS BAR */
.prog-wrap{background:#E0E7FF;border-radius:99px;height:8px;overflow:hidden;margin:8px 0}
.prog-bar{height:100%;background:var(--pri);border-radius:99px;transition:width .4s}
.prog-txt{display:flex;justify-content:space-between;font-size:12px;color:var(--sub)}

/* FLASHCARD */
.fc-wrap{display:flex;flex-direction:column;height:100%;padding:0}
.fc-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
  padding-top:max(14px,env(safe-area-inset-top));background:var(--pri);color:#fff;flex-shrink:0}
.fc-hdr h2{font-size:16px;font-weight:600}
.fc-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;
  width:34px;height:34px;font-size:18px;cursor:pointer;line-height:34px;text-align:center}
.fc-prog{height:4px;background:#C7D2FE}
.fc-prog-fill{height:100%;background:#fff;transition:width .3s}
.fc-body{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}

.flip-card{width:100%;max-width:360px;height:280px;perspective:1000px;cursor:pointer}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;box-shadow:0 8px 30px rgba(79,70,229,.2)}
.flip-front{background:linear-gradient(135deg,#4F46E5,#6D28D9);color:#fff}
.flip-back{background:#fff;transform:rotateY(180deg)}
.fc-kanji{font-size:52px;font-weight:700;margin-bottom:10px;text-align:center}
.fc-reading{font-size:22px;opacity:.85;text-align:center}
.fc-hint{font-size:13px;opacity:.6;margin-top:16px}
.fc-pos-badge{background:rgba(255,255,255,.2);border-radius:99px;padding:4px 12px;font-size:12px;margin-bottom:12px}
.back-kanji{font-size:28px;font-weight:700;color:var(--pri);margin-bottom:4px}
.back-reading{font-size:16px;color:var(--sub);margin-bottom:12px}
.back-meaning{font-size:26px;font-weight:700;color:var(--txt);text-align:center;margin-bottom:12px}
.back-pos{font-size:12px;color:var(--sub);background:var(--bg);border-radius:99px;padding:3px 10px;margin-bottom:12px}
.back-ex{font-size:13px;color:var(--sub);text-align:center;line-height:1.6;border-top:1px solid var(--bdr);padding-top:10px;width:100%}

.fc-btns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:12px 16px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--bdr);flex-shrink:0}
.rate-btn{padding:10px 4px;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;
  transition:transform .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.rate-btn:active{transform:scale(.95)}
.rate-btn .icon{font-size:18px}
.rate-btn.r0{background:#FEE2E2;color:#DC2626}
.rate-btn.r1{background:#FEF3C7;color:#D97706}
.rate-btn.r2{background:#D1FAE5;color:#059669}
.rate-btn.r3{background:#DBEAFE;color:#2563EB}
.fc-done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.fc-done h2{font-size:28px;font-weight:800;margin:16px 0 8px}
.fc-done p{color:var(--sub);margin-bottom:24px}

/* QUIZ */
.qz-wrap{display:flex;flex-direction:column;height:100%}
.qz-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
  padding-top:max(14px,env(safe-area-inset-top));background:var(--pri);color:#fff;flex-shrink:0}
.qz-prog{height:4px;background:#C7D2FE}
.qz-prog-fill{height:100%;background:#fff;transition:width .3s}
.qz-body{flex:1;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.qz-question{background:linear-gradient(135deg,#4F46E5,#6D28D9);border-radius:18px;
  padding:28px 20px;text-align:center;margin-bottom:20px;color:#fff}
.qz-q-word{font-size:46px;font-weight:700}
.qz-q-reading{font-size:18px;opacity:.8;margin-top:6px}
.qz-q-lbl{font-size:13px;opacity:.65;margin-bottom:10px}
.choice-btn{display:block;width:100%;padding:16px 18px;border:2px solid var(--bdr);
  border-radius:14px;background:#fff;font-size:16px;font-weight:500;cursor:pointer;
  margin-bottom:10px;text-align:left;transition:all .2s;color:var(--txt)}
.choice-btn:active{transform:scale(.98)}
.choice-btn.correct{border-color:var(--grn);background:#D1FAE5;color:#065F46}
.choice-btn.wrong{border-color:var(--red);background:#FEE2E2;color:#991B1B}
.choice-btn.disabled{cursor:default;opacity:.6}
.qz-score{text-align:center;padding:30px 20px}
.qz-score h2{font-size:28px;font-weight:800;margin:16px 0 8px}
.score-circle{width:120px;height:120px;border-radius:50%;border:6px solid var(--pri);
  display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px}
.score-num{font-size:32px;font-weight:800;color:var(--pri)}
.score-tot{font-size:14px;color:var(--sub)}

/* WORD LIST */
.search-bar{position:relative;margin-bottom:12px}
.search-bar input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid var(--bdr);
  border-radius:12px;font-size:15px;background:#fff;outline:none;color:var(--txt)}
.search-bar input:focus{border-color:var(--pri)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:16px}
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filter-tab{flex-shrink:0;padding:7px 14px;border-radius:99px;border:1.5px solid var(--bdr);
  background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:var(--sub)}
.filter-tab.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.word-item{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;align-items:center;gap:12px;cursor:pointer}
.word-item:active{opacity:.8}
.word-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-new{background:#9CA3AF}
.dot-learning{background:var(--org)}
.dot-learned{background:var(--grn)}
.word-main{flex:1;min-width:0}
.word-kanji{font-size:18px;font-weight:700}
.word-reading{font-size:13px;color:var(--sub);margin-top:1px}
.word-meaning{font-size:14px;color:var(--txt);font-weight:500}
.word-pos{font-size:11px;color:var(--sub);background:var(--bg);border-radius:99px;padding:2px 8px;flex-shrink:0}

/* WORD DETAIL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;margin:0 auto;
  padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--bdr);border-radius:99px;margin:0 auto 16px}
.modal-kanji{font-size:48px;font-weight:700;text-align:center;color:var(--pri)}
.modal-reading{font-size:20px;text-align:center;color:var(--sub);margin-bottom:8px}
.modal-meaning{font-size:22px;font-weight:700;text-align:center;margin-bottom:8px}
.modal-pos{text-align:center;margin-bottom:16px}
.modal-ex{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:16px}
.modal-ex p{font-size:14px;line-height:1.7;color:var(--txt)}
.modal-ex .ex-lbl{font-size:12px;color:var(--sub);margin-bottom:6px;font-weight:600}
.modal-progress{display:flex;gap:10px;margin-bottom:12px}
.modal-progress .mp{flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center}
.modal-progress .mp-num{font-size:18px;font-weight:700;color:var(--pri)}
.modal-progress .mp-lbl{font-size:11px;color:var(--sub)}

/* STATS */
.stats-hero{background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:18px;
  padding:20px;margin-bottom:14px;color:#fff;text-align:center}
.stats-hero h2{font-size:36px;font-weight:800}
.stats-hero p{opacity:.85;margin-top:4px}
.status-legend{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.legend-row{display:flex;align-items:center;justify-content:space-between;
  background:#fff;border-radius:12px;padding:12px 16px}
.legend-left{display:flex;align-items:center;gap:10px;font-weight:500}
.legend-dot{width:12px;height:12px;border-radius:50%}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1F2937;color:#fff;padding:10px 18px;border-radius:99px;font-size:14px;
  opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

<!-- ===== HOME ===== -->
<div id="s-home" class="screen active" style="padding-bottom:80px">
  <div class="streak-bar">
    <div class="streak-left">
      <h2 id="streak-num">🔥 0天</h2>
      <p id="today-date"></p>
    </div>
    <div class="streak-fire">日</div>
  </div>
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-num" id="stat-due">0</div>
      <div class="stat-lbl">📚 待複習</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-new">0</div>
      <div class="stat-lbl">✨ 新單字</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-learned">0</div>
      <div class="stat-lbl">✅ 已掌握</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-acc">—</div>
      <div class="stat-lbl">🎯 正確率</div>
    </div>
  </div>
  <div class="card">
    <div class="prog-txt"><span>總進度</span><span id="prog-pct">0%</span></div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="prog-txt" style="margin-top:4px"><span>0</span><span id="total-words">/ 200 單字</span></div>
  </div>
  <button class="btn btn-pri" onclick="startFlashcard('due')">📚 開始複習</button>
  <button class="btn btn-sec" onclick="startFlashcard('new')">✨ 學新單字</button>
  <button class="btn" style="background:#F3F4F6;color:#374151" onclick="startQuiz()">🎯 快速測驗</button>
</div>

<!-- ===== FLASHCARD ===== -->
<div id="s-flashcard" class="screen" style="padding:0;display:none;flex-direction:column;height:100%">
  <div class="fc-hdr">
    <button class="fc-close" onclick="exitStudy()">✕</button>
    <h2 id="fc-title">閃卡複習</h2>
    <span id="fc-counter" style="font-size:14px">0/0</span>
  </div>
  <div class="fc-prog"><div class="fc-prog-fill" id="fc-prog" style="width:0%"></div></div>
  <div id="fc-session-body" style="flex:1;display:flex;flex-direction:column">
    <div class="fc-body">
      <div class="flip-card" id="flip-card" onclick="flipCard()">
        <div class="flip-inner" id="flip-inner">
          <div class="flip-front">
            <div class="fc-pos-badge" id="fc-pos-front">名詞</div>
            <div class="fc-kanji" id="fc-kanji">機会</div>
            <div class="fc-reading" id="fc-reading">きかい</div>
            <div class="fc-hint">👆 點擊翻轉</div>
          </div>
          <div class="flip-back">
            <div class="back-kanji" id="bc-kanji">機会</div>
            <div class="back-reading" id="bc-reading">きかい</div>
            <div class="back-meaning" id="bc-meaning">機會</div>
            <div class="back-pos" id="bc-pos">名詞</div>
            <div class="back-ex" id="bc-ex"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="fc-btns">
      <button class="rate-btn r0" onclick="rateCard(0)"><span class="icon">😵</span>忘記</button>
      <button class="rate-btn r1" onclick="rateCard(1)"><span class="icon">🤔</span>模糊</button>
      <button class="rate-btn r2" onclick="rateCard(2)"><span class="icon">😊</span>記得</button>
      <button class="rate-btn r3" onclick="rateCard(3)"><span class="icon">⚡</span>簡單</button>
    </div>
  </div>
  <div class="fc-done" id="fc-done" style="display:none">
    <div style="font-size:72px">🎉</div>
    <h2 id="fc-done-title">複習完成！</h2>
    <p id="fc-done-sub">今天表現很棒！</p>
    <button class="btn btn-pri" style="margin-top:8px" onclick="exitStudy()">返回首頁</button>
    <button class="btn btn-sec" onclick="startFlashcard('due')" style="margin-top:4px">繼續複習</button>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div id="s-quiz" class="screen" style="padding:0;display:none;flex-direction:column;height:100%">
  <div class="qz-hdr">
    <button class="fc-close" onclick="exitStudy()">✕</button>
    <h2>選擇題測驗</h2>
    <span id="qz-counter" style="font-size:14px">0/0</span>
  </div>
  <div class="qz-prog"><div class="qz-prog-fill" id="qz-prog" style="width:0%"></div></div>
  <div id="qz-body" class="qz-body">
    <div class="qz-question">
      <div class="qz-q-lbl">「___」的意思是？</div>
      <div class="qz-q-word" id="qz-word">機会</div>
      <div class="qz-q-reading" id="qz-reading">きかい</div>
    </div>
    <div id="qz-choices"></div>
  </div>
  <div id="qz-score" class="qz-score" style="display:none">
    <div class="score-circle">
      <div class="score-num" id="score-pct">0%</div>
      <div class="score-tot" id="score-frac">0/0</div>
    </div>
    <h2 id="score-msg">測驗結束！</h2>
    <p id="score-sub" style="color:var(--sub);margin-bottom:20px"></p>
    <button class="btn btn-pri" onclick="startQuiz()">再來一次</button>
    <button class="btn btn-sec" onclick="exitStudy()">返回首頁</button>
  </div>
</div>

<!-- ===== WORD LIST ===== -->
<div id="s-words" class="screen" style="padding-bottom:80px;display:none">
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="search" id="search-input" placeholder="搜尋單字或意思..." oninput="renderWordList()">
  </div>
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all" onclick="setFilter(this,'all')">全部</button>
    <button class="filter-tab" data-filter="new" onclick="setFilter(this,'new')">未學</button>
    <button class="filter-tab" data-filter="learning" onclick="setFilter(this,'learning')">學習中</button>
    <button class="filter-tab" data-filter="learned" onclick="setFilter(this,'learned')">已掌握</button>
    <button class="filter-tab" data-filter="名詞" onclick="setFilter(this,'名詞')">名詞</button>
    <button class="filter-tab" data-filter="動詞" onclick="setFilter(this,'動詞')">動詞</button>
    <button class="filter-tab" data-filter="形容詞" onclick="setFilter(this,'形容詞')">形容詞</button>
    <button class="filter-tab" data-filter="副詞" onclick="setFilter(this,'副詞')">副詞</button>
  </div>
  <div id="word-list"></div>
</div>

<!-- ===== STATS ===== -->
<div id="s-stats" class="screen" style="padding-bottom:80px;display:none">
  <div class="stats-hero">
    <h2 id="st-pct">0%</h2>
    <p>整體進度</p>
  </div>
  <div class="status-legend">
    <div class="legend-row">
      <div class="legend-left"><div class="legend-dot" style="background:#9CA3AF"></div>未學習</div>
      <strong id="st-new">0</strong>
    </div>
    <div class="legend-row">
      <div class="legend-left"><div class="legend-dot" style="background:#D97706"></div>學習中</div>
      <strong id="st-learning">0</strong>
    </div>
    <div class="legend-row">
      <div class="legend-left"><div class="legend-dot" style="background:#059669"></div>已掌握</div>
      <strong id="st-learned">0</strong>
    </div>
    <div class="legend-row">
      <div class="legend-left"><div class="legend-dot" style="background:#4F46E5"></div>累計複習</div>
      <strong id="st-reviews">0</strong>
    </div>
    <div class="legend-row">
      <div class="legend-left"><div class="legend-dot" style="background:#DC2626"></div>正確率</div>
      <strong id="st-acc">—</strong>
    </div>
  </div>
  <button class="btn" style="background:#FEE2E2;color:#DC2626;font-weight:600" onclick="confirmReset()">🗑 重置所有進度</button>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bottom-nav">

  // 副詞・接続詞
  {id:151,k:"だんだん",r:"だんだん",m:"漸漸",p:"副詞",ex:"だんだん暖かくなってきた。",exm:"漸漸變暖了。"},

  {id:153,k:"なかなか",r:"なかなか",m:"相當、不容易（+否定）",p:"副詞",ex:"なかなか上手ですね。",exm:"相當厲害嘛。"},

  {id:156,k:"たぶん",r:"たぶん",m:"大概、也許",p:"副詞",ex:"たぶん明日は晴れるだろう。",exm:"明天大概會是晴天吧。"},
  {id:157,k:"ちょうど",r:"ちょうど",m:"剛好",p:"副詞",ex:"ちょうどいいサイズだ。",exm:"剛好合適的尺寸。"},

  {id:159,k:"もともと",r:"もともと",m:"本來、原本",p:"副詞",ex:"もともとここは森だった。",exm:"這裡原本是森林。"},

  {id:171,k:"しかし",r:"しかし",m:"但是",p:"接続詞",ex:"頑張った。しかし失敗した。",exm:"努力了。但是失敗了。"},
  {id:172,k:"ところが",r:"ところが",m:"然而、不料",p:"接続詞",ex:"晴れると思った。ところが雨だった。",exm:"以為會是晴天，不料卻下雨了。"},
  {id:173,k:"それに",r:"それに",m:"而且、加上",p:"接続詞",ex:"安くて、それに美味しい。",exm:"便宜，而且還好吃。"},
  {id:174,k:"そのため",r:"そのため",m:"因此",p:"接続詞",ex:"雨が降った。そのため遠足は中止になった。",exm:"下雨了。因此遠足取消了。"},
  {id:175,k:"したがって",r:"したがって",m:"因此、所以",p:"接続詞",ex:"法律に違反した。したがって罰せられる。",exm:"違反了法律。因此受到懲罰。"},
  {id:176,k:"つまり",r:"つまり",m:"也就是說、即",p:"接続詞",ex:"つまり、あなたは来ないということですか。",exm:"也就是說，你不來了嗎？"},
  {id:177,k:"たとえば",r:"たとえば",m:"例如",p:"接続詞",ex:"たとえば、犬や猫などのペットだ。",exm:"例如，狗和貓等寵物。"},

// ===================== SRS & PROGRESS =====================
const PROG_KEY = 'n3_prog_v2';
const META_KEY = 'n3_meta_v2';

function loadProg() { return JSON.parse(localStorage.getItem(PROG_KEY) || '{}'); }
function saveProg(p) { localStorage.setItem(PROG_KEY, JSON.stringify(p)); }
function loadMeta() { return JSON.parse(localStorage.getItem(META_KEY) || '{"streak":0,"lastDate":"","totalReviews":0,"totalCorrect":0}'); }
function saveMeta(m) { localStorage.setItem(META_KEY, JSON.stringify(m)); }

function getWordProg(id) {
  const p = loadProg();
  return p[id] || { status:'new', interval:0, reps:0, ef:2.5, next:null, reviews:0, correct:0 };
}

function updateWordProg(id, q) { // q: 0=wrong,1=hard,2=ok,3=easy
  const prog = loadProg();
  const wp = prog[id] || { status:'new', interval:0, reps:0, ef:2.5, next:null, reviews:0, correct:0 };
  wp.reviews++;
  if (q >= 2) wp.correct++;
  if (q === 0) {
    wp.interval = 1; wp.reps = 0; wp.status = 'learning';
  } else if (q === 1) {
    wp.interval = Math.max(1, wp.interval < 2 ? 1 : Math.floor(wp.interval * 1.2));
    wp.reps = Math.max(0, wp.reps - 1); wp.status = 'learning';
  } else {
    if (wp.reps === 0) wp.interval = 1;
    else if (wp.reps === 1) wp.interval = 6;
    else wp.interval = Math.round(wp.interval * wp.ef);
    if (q === 3) { wp.interval = Math.round(wp.interval * 1.3); wp.ef = Math.min(3.0, wp.ef + 0.15); }
    else { wp.ef = Math.max(1.3, wp.ef + 0.1 - (3-q)*(0.08+(3-q)*0.02)); }
    wp.reps++;
    wp.status = wp.interval >= 21 ? 'learned' : 'learning';
  }
  const d = new Date(); d.setDate(d.getDate() + wp.interval);
  wp.next = d.toISOString().split('T')[0];
  prog[id] = wp;
  saveProg(prog);

  const meta = loadMeta();
  meta.totalReviews++;
  if (q >= 2) meta.totalCorrect++;
  const today = new Date().toISOString().split('T')[0];
  if (meta.lastDate !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = yesterday.toISOString().split('T')[0];
    meta.streak = meta.lastDate === yStr ? meta.streak + 1 : 1;
    meta.lastDate = today;
  }
  saveMeta(meta);
  return wp;
}

function getDueWords() {
  const today = new Date().toISOString().split('T')[0];
  return WORDS.filter(w => {
    const wp = getWordProg(w.id);
    return wp.status !== 'new' && (wp.next === null || wp.next <= today);
  });
}

function getNewWords(limit=10) {
  return WORDS.filter(w => getWordProg(w.id).status === 'new').slice(0, limit);
}

// ===================== UI STATE =====================
let curScreen = 'home';
let wordFilter = 'all';
let fcSession = { words:[], idx:0, correct:0, wrong:0, flipped:false };
let qzSession = { words:[], idx:0, correct:0, answered:false };

// ===================== NAVIGATION =====================
function navigate(screen) {
  if (['flashcard','quiz'].includes(screen)) {
    if (screen === 'flashcard') startFlashcard('due');
    else startQuiz();
    return;
  }
  document.querySelectorAll('.screen').forEach(s => { s.style.display='none'; s.classList.remove('active'); });
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  const s = document.getElementById('s-'+screen);
  s.style.display = 'block';
  s.classList.add('active');
  document.getElementById('nav-'+screen)?.classList.add('active');
  curScreen = screen;
  document.getElementById('bottom-nav').style.display = 'flex';
  if (screen === 'home') updateHome();
  if (screen === 'words') renderWordList();
  if (screen === 'stats') renderStats();
}

function exitStudy() {
  navigate('home');
}

// ===================== HOME =====================
function updateHome() {
  const meta = loadMeta();
  const prog = loadProg();
  const today = new Date().toISOString().split('T')[0];
  const todayDate = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('today-date').textContent = todayDate;
  document.getElementById('streak-num').textContent = '🔥 '+meta.streak+'天連續';

  const due = getDueWords().length;
  const nw = getNewWords(10).length;
  let learned=0, total=0, rev=0, cor=0;
  WORDS.forEach(w => {
    total++;
    const wp = prog[w.id];
    if (wp) { if(wp.status==='learned') learned++; rev+=wp.reviews||0; cor+=wp.correct||0; }
  });
  document.getElementById('stat-due').textContent = due;
  document.getElementById('stat-new').textContent = nw;
  document.getElementById('stat-learned').textContent = learned;
  document.getElementById('stat-acc').textContent = rev>0 ? Math.round(cor/rev*100)+'%' : '—';
  const pct = Math.round(learned/total*100);
  document.getElementById('prog-bar').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('total-words').textContent = '/ '+total+' 單字';
}

// ===================== FLASHCARD =====================
function startFlashcard(mode) {
  let words;
  if (mode === 'due') {
    words = getDueWords();
    if (words.length === 0) {
      words = getNewWords(10);
      if (words.length === 0) { showToast('今天沒有需要複習的單字！'); return; }
    }
  } else {
    words = getNewWords(15);
    if (words.length === 0) { showToast('所有單字都已開始學習了！'); return; }
  }
  // shuffle
  words = words.sort(() => Math.random()-0.5).slice(0, 20);
  fcSession = { words, idx:0, correct:0, wrong:0, flipped:false };
  showFCScreen();
  loadFCCard();
}

function showFCScreen() {
  document.querySelectorAll('.screen').forEach(s => { s.style.display='none'; s.classList.remove('active'); });
  document.getElementById('bottom-nav').style.display = 'none';
  const sc = document.getElementById('s-flashcard');
  sc.style.display = 'flex';
  sc.classList.add('active');
  document.getElementById('fc-session-body').style.display = 'flex';
  document.getElementById('fc-done').style.display = 'none';
}

function loadFCCard() {
  if (fcSession.idx >= fcSession.words.length) { showFCDone(); return; }
  const w = fcSession.words[fcSession.idx];
  document.getElementById('fc-counter').textContent = (fcSession.idx+1)+'/'+fcSession.words.length;
  document.getElementById('fc-prog').style.width = (fcSession.idx/fcSession.words.length*100)+'%';
  document.getElementById('fc-pos-front').textContent = w.p;
  document.getElementById('fc-kanji').textContent = w.k;
  document.getElementById('fc-reading').textContent = w.r;
  document.getElementById('bc-kanji').textContent = w.k;
  document.getElementById('bc-reading').textContent = w.r;
  document.getElementById('bc-meaning').textContent = w.m;
  document.getElementById('bc-pos').textContent = w.p;
  const exEl = document.getElementById('bc-ex');
  if (w.ex) { exEl.innerHTML = '<b>例：</b>'+w.ex+'<br>'+w.exm; exEl.style.display='block'; }
  else { exEl.style.display='none'; }
  document.getElementById('flip-inner').classList.remove('flipped');
  fcSession.flipped = false;
}

function flipCard() {
  const inner = document.getElementById('flip-inner');
  fcSession.flipped = !fcSession.flipped;
  if (fcSession.flipped) inner.classList.add('flipped');
  else inner.classList.remove('flipped');
}

function rateCard(q) {
  if (!fcSession.flipped) { flipCard(); return; }
  const w = fcSession.words[fcSession.idx];
  updateWordProg(w.id, q);
  if (q >= 2) fcSession.correct++; else fcSession.wrong++;
  fcSession.idx++;
  setTimeout(loadFCCard, 200);
}

function showFCDone() {
  document.getElementById('fc-session-body').style.display = 'none';
  document.getElementById('fc-done').style.display = 'flex';
  const total = fcSession.correct + fcSession.wrong;
  document.getElementById('fc-done-title').textContent = '本輪完成！🎉';
  document.getElementById('fc-done-sub').textContent =
    '答對 '+fcSession.correct+'/'+total+' 張（'+Math.round(fcSession.correct/total*100)+'%）';
}

// ===================== QUIZ =====================
function startQuiz() {
  const pool = WORDS.filter(w => getWordProg(w.id).status !== 'new');
  let words = pool.length >= 10 ? pool : WORDS;
  words = words.sort(() => Math.random()-0.5).slice(0, 10);
  qzSession = { words, idx:0, correct:0, answered:false };
  showQZScreen();
  loadQZQuestion();
}

function showQZScreen() {
  document.querySelectorAll('.screen').forEach(s => { s.style.display='none'; s.classList.remove('active'); });
  document.getElementById('bottom-nav').style.display = 'none';
  const sc = document.getElementById('s-quiz');
  sc.style.display = 'flex';
  sc.classList.add('active');
  document.getElementById('qz-body').style.display = 'block';
  document.getElementById('qz-score').style.display = 'none';
}

function loadQZQuestion() {
  if (qzSession.idx >= qzSession.words.length) { showQZScore(); return; }
  const w = qzSession.words[qzSession.idx];
  document.getElementById('qz-counter').textContent = (qzSession.idx+1)+'/'+qzSession.words.length;
  document.getElementById('qz-prog').style.width = (qzSession.idx/qzSession.words.length*100)+'%';
  document.getElementById('qz-word').textContent = w.k;
  document.getElementById('qz-reading').textContent = w.r;
  qzSession.answered = false;

  // build 4 choices
  const wrong = WORDS.filter(x => x.id !== w.id).sort(() => Math.random()-0.5).slice(0,3);
  const choices = [w, ...wrong].sort(() => Math.random()-0.5);
  const el = document.getElementById('qz-choices');
  el.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.m;
    btn.onclick = () => answerQuiz(btn, c.id === w.id, w.id);
    el.appendChild(btn);
  });
}

function answerQuiz(btn, isCorrect, correctId) {
  if (qzSession.answered) return;
  qzSession.answered = true;
  const correctMeaning = WORDS.find(x => x.id === correctId)?.m;
  if (isCorrect) { btn.classList.add('correct'); qzSession.correct++; updateWordProg(correctId, 2); }
  else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === correctMeaning) b.classList.add('correct');
    });
    updateWordProg(correctId, 0);
  }
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));
  setTimeout(() => { qzSession.idx++; loadQZQuestion(); }, 1200);
}

function showQZScore() {
  document.getElementById('qz-body').style.display = 'none';
  document.getElementById('qz-score').style.display = 'block';
  const total = qzSession.words.length;
  const pct = Math.round(qzSession.correct/total*100);
  document.getElementById('score-pct').textContent = pct+'%';
  document.getElementById('score-frac').textContent = qzSession.correct+'/'+total;
  const msgs = [[80,'太棒了！🌟','繼續保持，你是單字王！'],[60,'不錯喔！😊','再加把勁，很快就能掌握！'],[0,'繼續加油！💪','多複習幾次就會記住的！']];
  const [,title,sub] = msgs.find(([min]) => pct >= min);
  document.getElementById('score-msg').textContent = title;
  document.getElementById('score-sub').textContent = sub;
}

// ===================== WORD LIST =====================
function setFilter(el, filter) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  wordFilter = filter;
  renderWordList();
}

function renderWordList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const prog = loadProg();
  let list = WORDS;
  if (q) list = list.filter(w => w.k.includes(q)||w.r.includes(q)||w.m.includes(q)||w.p.includes(q));
  if (['new','learning','learned'].includes(wordFilter)) {
    list = list.filter(w => (prog[w.id]?.status||'new') === wordFilter);
  } else if (['名詞','動詞','形容詞','な形容詞','副詞','接続詞'].includes(wordFilter)) {
    list = list.filter(w => w.p === wordFilter || (wordFilter==='形容詞' && (w.p==='形容詞'||w.p==='な形容詞')));
  }
  const el = document.getElementById('word-list');
  if (list.length === 0) { el.innerHTML = '<div style="text-align:center;color:var(--sub);padding:40px">找不到符合的單字</div>'; return; }
  el.innerHTML = list.map(w => {
    const wp = prog[w.id];
    const status = wp?.status || 'new';
    const dotClass = {new:'dot-new',learning:'dot-learning',learned:'dot-learned'}[status];
    return `<div class="word-item" onclick="showWordModal(${w.id})">
      <div class="word-status-dot ${dotClass}"></div>
      <div class="word-main">
        <div class="word-kanji">${w.k}</div>
        <div class="word-reading">${w.r}</div>
        <div class="word-meaning">${w.m}</div>
      </div>
      <div class="word-pos">${w.p}</div>
    </div>`;
  }).join('');
}

// ===================== WORD MODAL =====================
function showWordModal(id) {
  const w = WORDS.find(x => x.id === id);
  const wp = getWordProg(id);
  document.getElementById('m-kanji').textContent = w.k;
  document.getElementById('m-reading').textContent = w.r;
  document.getElementById('m-meaning').textContent = w.m;
  const posColors = {'名詞':'#4F46E5','動詞':'#059669','形容詞':'#D97706','な形容詞':'#7C3AED','副詞':'#0891B2','接続詞':'#DC2626','表現':'#6B7280'};
  const c = posColors[w.p]||'#6B7280';
  document.getElementById('m-pos').innerHTML = `<span style="background:${c}20;color:${c};padding:4px 12px;border-radius:99px;font-size:13px;font-weight:600">${w.p}</span>`;
  if (w.ex) {
    document.getElementById('m-ex').style.display='block';
    document.getElementById('m-ex-jp').textContent = w.ex;
    document.getElementById('m-ex-ch').textContent = w.exm;
  } else { document.getElementById('m-ex').style.display='none'; }
  const statusLabel = {new:'未學習',learning:'學習中',learned:'已掌握'}[wp.status];
  document.getElementById('m-status').textContent = statusLabel;
  document.getElementById('m-reviews').textContent = wp.reviews||0;
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('m-interval').textContent = wp.next && wp.next > today ?
    wp.next.slice(5).replace('-','/') : (wp.next ? '今天' : '—');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal-overlay').classList.remove('open'); }

// ===================== STATS =====================
function renderStats() {
  const prog = loadProg();
  const meta = loadMeta();
  let nw=0, learning=0, learned=0;
  let rev=0, cor=0;
  WORDS.forEach(w => {
    const wp = prog[w.id];
    const s = wp?.status||'new';
    if(s==='new') nw++; else if(s==='learning') learning++; else learned++;
    rev += wp?.reviews||0; cor += wp?.correct||0;
  });
  const total = WORDS.length;
  const pct = Math.round(learned/total*100);
  document.getElementById('st-pct').textContent = pct+'%';
  document.getElementById('st-new').textContent = nw;
  document.getElementById('st-learning').textContent = learning;
  document.getElementById('st-learned').textContent = learned;
  document.getElementById('st-reviews').textContent = rev;
  document.getElementById('st-acc').textContent = rev>0 ? Math.round(cor/rev*100)+'%' : '—';
}

function confirmReset() {
  if (confirm('確定要重置所有學習進度嗎？此操作無法復原。')) {
    localStorage.removeItem(PROG_KEY);
    localStorage.removeItem(META_KEY);
    renderStats();
    showToast('進度已重置');
  }
}

// ===================== TOAST =====================
function showToast(msg, duration=2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ===================== INIT =====================
function init() {
  // register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
  // update streak on load
  const meta = loadMeta();
  const today = new Date().toISOString().split('T')[0];
  if (meta.lastDate && meta.lastDate !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    if (meta.lastDate !== yesterday.toISOString().split('T')[0]) {
      meta.streak = 0; saveMeta(meta);
    }
  }
  navigate('home');
